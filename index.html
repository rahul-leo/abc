<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Python App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <div class="content">
            <div class="icon-header">🚀</div>
            <h1>Python Backend Integration</h1>
            <p class="subtitle">FastAPI + Vanilla JS Frontend</p>
            <div class="status-indicator">
                <span class="dot"></span> Backend Connected
            </div>
            <button class="primary-btn" onclick="showMessage()">Fetch Data</button>
            <div class="response-area">
                <h2 id="message">Click the button to see the magic...</h2>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
